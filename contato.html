<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="titulo_top">
            <h1>O Senhor dos Anéis! - Um filme massa</h1>
            <h2>Uma das trilogias mais famosas - Saga cinematográfica legal</h2>
            <nav>
                <a href="index.html">Home</a>
                <a href="sinopse.html">Sinopse</a>
                <a href="imagemfilme.html">Imagem do filme</a>
                <a href="personagens.html">Personagens principais</a>
                <a href="informacoes.html">Informações</a>
                <a href="ordem.html">Ordem dos Filmes</a>
                <a href="curiosidades.html">Curiosidades</a>
                <a href="impacto.html">Impacto Cultural</a>
                <a href="contato">Contato</a>
            </nav>
        </div>
        <h2 class="titulo_secundario">Entre em contato:</h2>
        <form action="processa.php" method="POST" autocomplete="off">
            <label for="nomepessoa"> Nome:</label>
            <input type="text" name="nomepessoas"
            id="nomepessoa" minlength="3" maxlength="15" require placeholder=""><br><br>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required><br><br>

            <label for="ano">Ano de Nascimento:</label>
            <input type="number" id="ano" name="ano" max="2026" min="1900" placeholder="Informe seu ano de nascimento">

            <label for="telefone">Telefone</label>
            <input type="number" id="telefone" name="telefone" placeholder="Informe seu telefone:">
            
            <label for="github">Informe seu Github:</label>
            <input type="url" name="github" id="github" placeholder="Informe seu github:"><br><br>

            <label for="senha">Informe sua senha:</label>
            <input type="password" id="senha" name="senha"><br><br>

            <label for="arquivo">Anexe um arquivo</label>
            <input type="file" id="arquivo" name="arquivo">

            <label for="color">Escolha uma cor:</label>
            <input type="color" id="color" name="color"><br><br>

            <fieldset>
                <legend>Campos de tempo</legend>
                <label for="data">Informe a data</label>
                <input type="data" id="data" name="data">

                <label for="mes">Informe o mês</label>
                <input type="month" id="mes" name="mes">

                <label for="semana">Informe a semana</label>
                <input type="week" id="semana" name="semana"><br><br>

                <label for="hora">Informe a hora</label>
                <input type="time" id="hora" name="hora"><br><br>

                <label for="datahora">Data e hora atual</label>
                <input type="datetime-local" id="datahora" name="datahora">
            </fieldset>
                <legend>Qual o seu filme favorito?</legend>
                <label for="pesquisa">Pesquisa</label>
                <input type="search" id="pesquisa" name="pesquisa">

                <label for="descricao">Informe aqui o que você gosta nos filmes:</label>
                <textarea cols="10" rows="5" name="descricao" id="descricao"></textarea><br><be></be>

                <fieldset>
                <label for="filme1"><input type="radio" name="filme" id="filme1" value="Filme 1">Filme 1</label>

                <label for="filme2"><input checked type="radio" name="filme" id="filme2" value="Filme 2">Filme 2</label>
                
                <label for="filme3"><input type="radio" name="filme" id="filme3" value="Filme 3">Filme 3</label>
            </fieldset>

            <select>
                <option value="filme 1">Filme 1</option>
                <option value="filme 2">Filme 2</option>
                <option velue="filme 3">Filme 3</option>
            </select>

            <button type="reset">Limpar</button>
            <button type="submit">Enviar</button>

        </form>

</body>
</html>
